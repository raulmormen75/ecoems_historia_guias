<!doctype html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Verificación Historia Retry</title>
  <style>
    html,body,iframe{margin:0;width:100%;height:100%;border:0;background:#f4f1e8}
  </style>
</head>
<body>
  <iframe id="app" src="index-historia.html?v=verify-retry"></iframe>
  <script>
    const frame = document.getElementById('app');
    frame.addEventListener('load', () => {
      setTimeout(() => {
        const doc = frame.contentDocument;
        doc.querySelector('[data-action="pick-option"][data-id="g1-r53"][data-option="A"]')?.click();
        doc.querySelector('[data-action="toggle-hint"][data-id="g1-r53"]')?.click();
      }, 900);
      setTimeout(() => {
        const doc = frame.contentDocument;
        doc.querySelector('[data-action="retry-option"][data-id="g1-r53"]')?.click();
      }, 1800);
    });
  </script>
</body>
</html>
